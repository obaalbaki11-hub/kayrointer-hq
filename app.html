<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kayro Interactive — AI Workforce</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233b82f6'/><text y='72' font-size='62' font-family='sans-serif' font-weight='900' fill='white' text-anchor='middle' x='50'>K</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-wordmark" id="brand-name"><span class="brand-k">K</span>ayro</div>
    <div class="brand-sub">INTERACTIVE</div>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav">
    <button class="nav-item active" data-page="hq"><span class="ni">🏢</span> Headquarters</button>
    <button class="nav-item" data-page="tasks"><span class="ni">✅</span> Tasks</button>
    <button class="nav-item" data-page="spreadsheet"><span class="ni">📊</span> Spreadsheet</button>
    <button class="nav-item" data-page="email"><span class="ni">✉️</span> Cold Email</button>
    <button class="nav-item" data-page="design"><span class="ni">🎨</span> Design Studio</button>
    <button class="nav-item" data-page="memory"><span class="ni">🧠</span> Brain</button>
  </nav>
  <div class="sidebar-footer">
    <div id="usage-meter" class="usage-meter"></div>
    <div class="api-status" id="api-status">⚪ No API Key</div>
    <button class="nav-item" data-page="settings"><span class="ni">⚙️</span> Settings</button>
  </div>
</aside>

<!-- APP WRAPPER -->
<div class="app-wrapper">

  <!-- TOPBAR -->
  <header id="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="topbar-title">Headquarters</div>
    </div>
    <div class="topbar-right" id="topbar-right">
      <button class="tb-btn" id="chat-toggle-btn">💬 Chat</button>
    </div>
    <div id="auth-user-area" class="auth-user-area"></div>
  </header>

  <!-- PAGE CONTAINER -->
  <div id="page-container"></div>

</div>

<!-- GLOBAL CHAT PANEL -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-hdr">
    <div class="chat-panel-emp">
      <div class="chat-av-lg" id="cp-av"></div>
      <div>
        <div class="cp-name" id="cp-name">Select Employee</div>
        <div class="cp-role" id="cp-role">AI Employee</div>
      </div>
    </div>
    <button class="icon-btn" id="chat-close">✕</button>
  </div>
  <div class="chat-emp-tabs" id="chat-emp-tabs"></div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-row">
    <textarea class="chat-input" id="chat-input" rows="1" placeholder="Message your AI employee…"></textarea>
    <button class="chat-send" id="chat-send">↑</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box">
    <div class="modal-hdr">
      <div class="modal-hdr-title" id="modal-title"></div>
      <button class="icon-btn" id="modal-close">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- AUTH OVERLAY -->
<div class="auth-overlay" id="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo"><span class="auth-k">K</span>ayro</div>
    <div class="auth-wordmark-sub">INTERACTIVE</div>
    <div class="auth-headline">Your AI Workforce,<br>Ready to Work.</div>
    <div class="auth-body">
      <button class="auth-google-btn" id="auth-google-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      <div class="auth-divider"><span>or sign in with email</span></div>
      <input class="auth-input" id="auth-email" type="email" placeholder="Email address" autocomplete="email">
      <input class="auth-input" id="auth-password" type="password" placeholder="Password" autocomplete="current-password">
      <div class="auth-error" id="auth-error"></div>
      <div style="display:flex;gap:8px">
        <button class="auth-btn-primary" id="auth-signin-btn">Sign In</button>
        <button class="auth-btn-secondary" id="auth-signup-btn">Create Account</button>
      </div>
      <button class="auth-guest-btn" id="auth-guest-btn">Continue as Guest →</button>
    </div>
  </div>
</div>

<!-- Firebase SDKs (loaded lazily when config is saved) -->
<script src="app.js"></script>
</body>
</html>
