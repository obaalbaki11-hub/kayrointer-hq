<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="37eac7b9bfa6f9ee">
<title>Kayro Interactive — AI Workforce</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233b82f6'/><text y='72' font-size='62' font-family='sans-serif' font-weight='900' fill='white' text-anchor='middle' x='50'>K</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css?v=20260613a">
<style>
.hq-manager-card{border-color:rgba(91,46,255,.25)!important;background:#ffffff!important;box-shadow:0 2px 16px rgba(91,46,255,.1),0 0 0 1px rgba(91,46,255,.1) inset!important}
.hq-manager-card .hq-card-name{color:var(--text)!important}
.hq-manager-card .hq-card-role{color:var(--text2)!important}
.hq-manager-card .hq-act-txt{color:var(--text2)!important}
.hq-manager-card .hq-badge{color:var(--text3)!important;border-color:var(--border)!important;background:var(--surface2)!important}
.hq-manager-card .hq-skill-chip{color:var(--accent)!important;border-color:var(--accent-dim2)!important;background:var(--accent-dim)!important}
.hq-manager-card .hq-card-activity{background:var(--surface2)!important}
.hq-manager-card .hq-online-dot{border-color:#fff!important}
.hq-manager-crown{color:var(--accent)!important;border-bottom:1px solid rgba(91,46,255,.12)!important;background:linear-gradient(90deg,rgba(91,46,255,.07),transparent)!important}
.hq-agent-grid{grid-template-columns:repeat(3,1fr)!important}
.hq-spec-grid{grid-template-columns:repeat(3,1fr)!important}
@media(max-width:1100px){.hq-agent-grid{grid-template-columns:repeat(2,1fr)!important}.hq-spec-grid{grid-template-columns:repeat(2,1fr)!important}}
@media(max-width:600px){.hq-agent-grid{grid-template-columns:1fr!important}.hq-spec-grid{grid-template-columns:1fr!important}}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">K</div>
    <div class="brand-text-wrap">
      <div class="brand-wordmark" id="brand-name">Kayro</div>
      <div class="brand-sub">Interactive</div>
    </div>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav">
    <button class="nav-item active" data-page="hq"><span class="ni">🏢</span> Headquarters</button>
    <button class="nav-item" data-page="company"><span class="ni">🏷️</span> Company Profile</button>
    <button class="nav-item" data-page="tasks"><span class="ni">✅</span> Tasks</button>
    <button class="nav-item" data-page="spreadsheet"><span class="ni">📊</span> Spreadsheet</button>
    <button class="nav-item" data-page="email"><span class="ni">✉️</span> Cold Email</button>
    <button class="nav-item" data-page="design"><span class="ni">🎨</span> Design Studio</button>
    <button class="nav-item" data-page="adstudio"><span class="ni">🎬</span> Ad Studio</button>
    <button class="nav-item" data-page="socialstudio"><span class="ni">✨</span> Social Studio</button>
    <button class="nav-item" data-page="remotion"><span class="ni">🎞</span> Kayro Studio</button>
    <button class="nav-item" data-page="slides"><span class="ni">📽️</span> Slide Decks</button>
    <button class="nav-item" data-page="travel"><span class="ni">✈️</span> Travel</button>
    <button class="nav-item" data-page="freight"><span class="ni">🚢</span> Freight</button>
    <button class="nav-item" data-page="memory"><span class="ni">🧠</span> Brain</button>
    <button class="nav-item" data-page="connectors"><span class="ni">🔌</span> Connectors</button>
    <button class="nav-item" data-page="swarm"><span class="ni">🐝</span> Swarm Mode</button>
    <button class="nav-item" data-page="ops"><span class="ni">⚡</span> Operations</button>
    <button class="nav-item" data-page="automations"><span class="ni">🤖</span> Automations</button>
    <button class="nav-item" data-page="compete"><span class="ni">⚔️</span> Competitive Intel</button>
    <button class="nav-item" data-page="security"><span class="ni">🛡️</span> Security</button>
    <button class="nav-item" data-page="skills"><span class="ni">⚡</span> Skills</button>
    <button class="nav-item" data-page="plans"><span class="ni">💎</span> Plans & Tokens</button>
    <div class="nav-section-label">Integrations</div>
    <button class="nav-item" data-page="apollo"><span class="ni">🔍</span> Hunter.io</button>
    <button class="nav-item" data-page="meta"><span class="ni">📊</span> Meta Ads</button>
  </nav>
  <div class="sidebar-footer">
    <div class="api-status" id="api-status">⚪ No API Key</div>
    <button class="nav-item" data-page="settings"><span class="ni">⚙️</span> Settings</button>
  </div>
</aside>

<!-- APP WRAPPER -->
<div class="app-wrapper">

  <!-- TOPBAR -->
  <header id="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="topbar-title">Headquarters</div>
    </div>
    <div class="topbar-right" id="topbar-right">
      <button class="tb-btn" id="chat-toggle-btn">💬 Chat</button>
    </div>
    <div id="auth-user-area" class="auth-user-area"></div>
  </header>

  <!-- PAGE CONTAINER -->
  <div id="page-container"></div>

</div>

<!-- GLOBAL CHAT PANEL -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-hdr">
    <div class="chat-panel-emp">
      <div class="chat-av-lg" id="cp-av"></div>
      <div>
        <div class="cp-name" id="cp-name">Select Employee</div>
        <div class="cp-role" id="cp-role">AI Employee</div>
      </div>
    </div>
    <button class="icon-btn" id="chat-close">✕</button>
  </div>
  <div class="chat-emp-tabs" id="chat-emp-tabs"></div>
  <div class="chat-messages" id="chat-messages"></div>
  <input type="file" id="chat-img-input" accept="image/*" style="display:none">
  <div class="chat-img-preview" id="chat-img-preview">
    <img id="chat-img-thumb" src="" alt="">
    <button class="chat-img-remove" id="chat-img-remove" title="Remove image">✕</button>
  </div>
  <div class="chat-input-row">
    <button class="chat-attach" id="chat-attach" title="Attach image">📎</button>
    <textarea class="chat-input" id="chat-input" rows="1" placeholder="Message your AI employee…"></textarea>
    <button class="chat-send" id="chat-send">↑</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box">
    <div class="modal-hdr">
      <div class="modal-hdr-title" id="modal-title"></div>
      <button class="icon-btn" id="modal-close">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- AUTH OVERLAY — hidden by default; shown only by Auth._showOverlay() -->
<div class="auth-overlay" id="auth-overlay" style="display:none">
  <div class="auth-card">
    <button class="auth-x-btn" id="auth-x-btn">✕</button>
    <div class="auth-logo-circle">K</div>
    <div class="auth-title">Kayro Interactive</div>
    <div class="auth-tagline">Your AI workforce, on demand</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="auth-tab-in">Sign In</button>
      <button class="auth-tab" id="auth-tab-up">Sign Up</button>
    </div>

    <button class="auth-github-btn" id="auth-github-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg> Continue with GitHub</button>
    <div class="auth-divider">or</div>

    <label class="auth-label">EMAIL</label>
    <input class="auth-input" id="auth-email" type="email" placeholder="you@company.com" autocomplete="email">
    <label class="auth-label" style="margin-top:10px">PASSWORD</label>
    <input class="auth-input" id="auth-password" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="auth-forgot-btn" id="auth-forgot-btn" type="button">Forgot password?</button>

    <div class="auth-error" id="auth-error"></div>

    <button class="auth-cta-btn" id="auth-signin-btn">Sign In → Launch HQ</button>
    <button class="auth-cta-btn" id="auth-signup-btn" style="display:none">Create Account → Launch HQ</button>

    <div class="auth-foot">
      <span id="auth-foot-txt">No account?</span>
      <button class="auth-foot-link" id="auth-foot-link">Sign up free</button>
    </div>
    <button class="auth-guest-btn" id="auth-guest-btn">Continue as Guest →</button>
    <div style="margin-top:14px;text-align:center;font-size:11px;color:rgba(255,255,255,.3)">
      By signing up you agree to our <a href="privacy.html" target="_blank" style="color:rgba(255,255,255,.45);text-decoration:underline;text-underline-offset:2px">Privacy Policy</a>
    </div>
  </div>
</div>

<!-- Markdown renderer for chat -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<!-- HIGH-5: DOMPurify — sanitize all marked.parse() output before innerHTML -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<!-- Firebase SDKs (loaded lazily when config is saved) -->
<script src="app.js?v=20260613a"></script>
</body>
</html>
