<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kayro Interactive — AI Workforce</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233b82f6'/><text y='72' font-size='62' font-family='sans-serif' font-weight='900' fill='white' text-anchor='middle' x='50'>K</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-mark">K</div>
    <div>
      <div class="brand-name" id="brand-name">Kayro</div>
      <div class="brand-sub">AI WORKFORCE</div>
    </div>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav">
    <button class="nav-item active" data-page="hq"><span class="ni">🏢</span> Headquarters</button>
    <button class="nav-item" data-page="employees"><span class="ni">👥</span> Employees</button>
    <button class="nav-item" data-page="tasks"><span class="ni">✅</span> Tasks</button>
    <button class="nav-item" data-page="spreadsheet"><span class="ni">📊</span> Spreadsheet</button>
    <button class="nav-item" data-page="email"><span class="ni">✉️</span> Cold Email</button>
  </nav>
  <div class="sidebar-footer">
    <div class="api-status" id="api-status">⚪ No API Key</div>
    <button class="nav-item" data-page="settings"><span class="ni">⚙️</span> Settings</button>
  </div>
</aside>

<!-- APP WRAPPER -->
<div class="app-wrapper">

  <!-- TOPBAR -->
  <header id="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="topbar-title">Headquarters</div>
    </div>
    <div class="topbar-right" id="topbar-right">
      <button class="tb-btn" id="chat-toggle-btn">💬 Chat</button>
    </div>
  </header>

  <!-- PAGE CONTAINER -->
  <div id="page-container"></div>

</div>

<!-- GLOBAL CHAT PANEL -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-hdr">
    <div class="chat-panel-emp">
      <div class="chat-av-lg" id="cp-av"></div>
      <div>
        <div class="cp-name" id="cp-name">Select Employee</div>
        <div class="cp-role" id="cp-role">AI Employee</div>
      </div>
    </div>
    <button class="icon-btn" id="chat-close">✕</button>
  </div>
  <div class="chat-emp-tabs" id="chat-emp-tabs"></div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-row">
    <textarea class="chat-input" id="chat-input" rows="1" placeholder="Message your AI employee…"></textarea>
    <button class="chat-send" id="chat-send">↑</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box">
    <div class="modal-hdr">
      <div class="modal-hdr-title" id="modal-title"></div>
      <button class="icon-btn" id="modal-close">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-wrap" id="toast-wrap"></div>

<script src="app.js"></script>
</body>
</html>
