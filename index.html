<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kayro HQ — Virtual Office</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #070d1a;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  user-select: none;
  color: #fff;
}
canvas { display: block; position: fixed; inset: 0; z-index: 1; }

/* ── TOP TITLE ── */
.top-title {
  position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
  font-size: 12px; font-weight: 600; letter-spacing: 5px; color: #7eb3ff;
  z-index: 300; pointer-events: none;
}

/* ── EMPLOYEE BAR ── */
.emp-bar {
  position: fixed; top: 42px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; z-index: 300;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
  border-radius: 24px; padding: 5px 14px; backdrop-filter: blur(14px); gap: 0;
}
.emp-item {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 16px; cursor: pointer; transition: background 0.2s;
}
.emp-item:hover { background: rgba(255,255,255,0.08); }
.emp-av {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 800;
}
.emp-name { font-size: 12px; color: #c8d8f0; font-weight: 400; }
.emp-dots { display: flex; gap: 2px; align-items: center; }
.edot { width: 5px; height: 5px; border-radius: 50%; }
.edot-on { background: #22c55e; }
.edot-off { background: #2a3550; }
.emp-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.08); margin: 0 3px; }

/* ── STANDUP PANEL ── */
.standup {
  position: fixed; top: 14px; right: 14px;
  background: rgba(7,13,26,0.92); border: 1px solid rgba(100,150,255,0.15);
  border-radius: 12px; padding: 12px 14px; z-index: 300; min-width: 185px;
  backdrop-filter: blur(16px);
}
.s-label { font-size: 9px; letter-spacing: 2.5px; color: #4a6080; font-weight: 700; margin-bottom: 5px; }
.s-msg { font-size: 12px; color: #c0d0e8; line-height: 1.5; }
.s-count { font-size: 11px; color: #22c55e; margin: 4px 0 10px; }
.s-btn {
  width: 100%; background: #22c55e; color: #000; border: none;
  border-radius: 6px; padding: 6px 8px; font-size: 10px; font-weight: 800;
  letter-spacing: 1.5px; cursor: pointer; font-family: inherit; transition: background 0.2s;
}
.s-btn:hover { background: #16a34a; }

/* ── BOTTOM BAR ── */
.bot-bar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 32px;
  background: rgba(4,8,18,0.97); border-top: 1px solid rgba(255,255,255,0.05);
  display: flex; align-items: center; padding: 0 16px; z-index: 300; gap: 5px;
}
.bst { font-size: 11px; color: #3a4a60; display: flex; align-items: center; gap: 3px; }
.bst b { color: #6080a0; font-weight: 500; }
.bdiv { color: #1a2030; font-size: 12px; }
.bhints { margin-left: auto; display: flex; gap: 14px; }
.bh { font-size: 10px; color: #253040; letter-spacing: 0.3px; }

/* ── CHAT BUTTON ── */
.chat-btn {
  position: fixed; bottom: 40px; right: 14px;
  background: rgba(30,60,120,0.7); border: 1px solid rgba(100,150,255,0.3);
  color: #7eb3ff; padding: 7px 18px; border-radius: 8px;
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  cursor: pointer; z-index: 300; font-family: inherit; transition: all 0.2s;
}
.chat-btn:hover { background: rgba(50,100,200,0.8); border-color: rgba(120,180,255,0.5); color: #fff; }

/* ── NAME TAGS ── */
.ntag {
  position: fixed; pointer-events: none; z-index: 200;
  transform: translate(-50%, -100%); display: flex; flex-direction: column; align-items: center;
}
.ntag-box {
  background: rgba(5,10,25,0.92); border: 1px solid rgba(100,150,255,0.18);
  color: #d0e0f8; padding: 3px 10px; border-radius: 5px;
  font-size: 11px; font-weight: 500;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
  backdrop-filter: blur(6px); margin-bottom: 4px;
}
.ntag-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* ── WATERMARK ── */
.wm {
  position: fixed; bottom: 44px; left: 50%; transform: translateX(-50%);
  font-size: 20px; font-weight: 800; letter-spacing: 5px;
  color: rgba(80,120,200,0.1); pointer-events: none; z-index: 2;
}

/* ════════════════════════════════════
   MODAL OVERLAY
════════════════════════════════════ */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
  backdrop-filter: blur(4px);
}
.overlay.open { opacity: 1; pointer-events: all; }

/* ── STANDUP BOARD MODAL ── */
.modal {
  background: #0b1428; border: 1px solid rgba(100,160,255,0.2);
  border-radius: 16px; padding: 28px 32px; width: 460px; max-width: 92vw;
  box-shadow: 0 30px 80px rgba(0,0,30,0.6);
  transform: translateY(20px); transition: transform 0.25s;
}
.overlay.open .modal { transform: translateY(0); }

.modal-hdr {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px;
}
.modal-title { font-size: 15px; font-weight: 700; letter-spacing: 2px; color: #7eb3ff; }
.modal-close {
  background: none; border: none; color: #456; font-size: 20px; cursor: pointer;
  line-height: 1; padding: 4px 8px; border-radius: 6px; transition: background 0.2s;
}
.modal-close:hover { background: rgba(255,255,255,0.06); color: #fff; }

.standup-attendees { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.att-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-radius: 10px; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
}
.att-av {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; flex-shrink: 0;
}
.att-name { font-size: 13px; font-weight: 500; color: #c8d8f0; flex: 1; }
.att-badge {
  font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
  letter-spacing: 0.5px;
}
.att-badge.arrived { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
.att-badge.waiting { background: rgba(100,120,180,0.1); color: #5070a0; border: 1px solid rgba(100,120,180,0.2); }

.modal-progress {
  background: rgba(255,255,255,0.04); border-radius: 10px; padding: 12px 16px;
  display: flex; align-items: center; gap: 14px;
}
.prog-bar-wrap { flex: 1; background: rgba(255,255,255,0.06); border-radius: 99px; height: 6px; overflow: hidden; }
.prog-bar { height: 100%; border-radius: 99px; background: #22c55e; transition: width 0.6s; }
.prog-text { font-size: 12px; color: #22c55e; font-weight: 600; white-space: nowrap; }

/* ── CHAT PANEL ── */
.chat-panel {
  position: fixed; top: 0; right: -420px; bottom: 0; width: 380px;
  background: #080e1e; border-left: 1px solid rgba(100,150,255,0.15);
  z-index: 400; display: flex; flex-direction: column;
  transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow: -20px 0 60px rgba(0,0,20,0.5);
}
.chat-panel.open { right: 0; }

.chat-hdr {
  padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; gap: 12px;
}
.chat-hdr-av {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800;
}
.chat-hdr-info { flex: 1; }
.chat-hdr-name { font-size: 14px; font-weight: 600; color: #d0e0f8; }
.chat-hdr-status { font-size: 11px; color: #22c55e; display: flex; align-items: center; gap: 4px; }
.chat-hdr-status::before { content:''; display:inline-block; width:6px; height:6px; border-radius:50%; background:#22c55e; }
.chat-close {
  background: none; border: none; color: #456; font-size: 18px;
  cursor: pointer; padding: 6px; border-radius: 6px; transition: background 0.2s;
}
.chat-close:hover { background: rgba(255,255,255,0.06); color: #fff; }

.chat-emp-select {
  padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex; gap: 8px; overflow-x: auto;
}
.chat-emp-pill {
  display: flex; align-items: center; gap: 6px; padding: 5px 11px;
  border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer; white-space: nowrap; transition: all 0.2s; flex-shrink: 0;
  background: rgba(255,255,255,0.03); font-size: 11px; color: #8090a8;
}
.chat-emp-pill.active { border-color: rgba(100,180,255,0.4); background: rgba(40,80,160,0.2); color: #7eb3ff; }
.chat-emp-pill .dot { width: 7px; height: 7px; border-radius: 50%; }

.chat-msgs {
  flex: 1; overflow-y: auto; padding: 16px; display: flex;
  flex-direction: column; gap: 14px;
}
.chat-msgs::-webkit-scrollbar { width: 4px; }
.chat-msgs::-webkit-scrollbar-track { background: transparent; }
.chat-msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

.msg { display: flex; gap: 10px; max-width: 88%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-av {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800;
}
.msg-body { display: flex; flex-direction: column; gap: 3px; }
.msg-name { font-size: 10px; color: #4a6080; }
.msg.user .msg-name { text-align: right; }
.msg-bubble {
  padding: 9px 13px; border-radius: 12px; font-size: 13px; line-height: 1.5;
  color: #c8d8f0;
}
.msg:not(.user) .msg-bubble { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07); border-radius: 4px 12px 12px 12px; }
.msg.user .msg-bubble { background: rgba(40,80,180,0.35); border: 1px solid rgba(80,130,255,0.2); border-radius: 12px 4px 12px 12px; }

.typing-indicator { display: flex; align-items: center; gap: 5px; padding: 4px 0; }
.typing-dot { width: 6px; height: 6px; border-radius: 50%; background: #4a6080; animation: typingBounce 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%,60%,100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

.chat-input-area {
  padding: 14px 16px; border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; gap: 10px; align-items: center;
}
.chat-input {
  flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
  border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #c8d8f0;
  font-family: inherit; outline: none; transition: border-color 0.2s; resize: none;
}
.chat-input::placeholder { color: #2a3a50; }
.chat-input:focus { border-color: rgba(100,160,255,0.35); }
.chat-send {
  background: #2255cc; border: none; color: #fff; width: 38px; height: 38px;
  border-radius: 10px; cursor: pointer; font-size: 16px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; transition: background 0.2s;
}
.chat-send:hover { background: #3366dd; }
</style>
</head>
<body>

<!-- ── UI CHROME ── -->
<div class="top-title">KAYRO HEADQUARTERS</div>
<div class="emp-bar" id="emp-bar"></div>

<div class="standup">
  <div class="s-label">STANDUP</div>
  <div class="s-msg">Gathering in meeting room.</div>
  <div class="s-count">2/6 arrived</div>
  <button class="s-btn" id="standup-btn">STANDUP BOARD</button>
</div>

<div class="bot-bar">
  <div class="bst"><b>0</b> working</div>
  <div class="bdiv">•</div>
  <div class="bst"><b>6</b> idle</div>
  <div class="bdiv">•</div>
  <div class="bst"><b>0</b> error</div>
  <div class="bdiv">•</div>
  <div class="bst">quiet</div>
  <div class="bhints">
    <span class="bh">drag</span>
    <span class="bh">scroll</span>
    <span class="bh">space+drag</span>
    <span class="bh">dbl-click</span>
  </div>
</div>

<button class="chat-btn" id="chat-btn">CHAT</button>
<div class="wm">KAYRO.AI</div>
<div id="ntags"></div>

<!-- ════ STANDUP BOARD MODAL ════ -->
<div class="overlay" id="standup-overlay">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">STANDUP BOARD</div>
      <button class="modal-close" id="standup-close">✕</button>
    </div>
    <div class="standup-attendees" id="att-list"></div>
    <div class="modal-progress">
      <div class="prog-bar-wrap">
        <div class="prog-bar" id="prog-bar" style="width:33%"></div>
      </div>
      <div class="prog-text">2 / 6 arrived</div>
    </div>
  </div>
</div>

<!-- ════ CHAT PANEL ════ -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-hdr">
    <div class="chat-hdr-av" id="chat-av" style="background:#3b82f622;color:#3b82f6">O</div>
    <div class="chat-hdr-info">
      <div class="chat-hdr-name" id="chat-name">Omar</div>
      <div class="chat-hdr-status">Online</div>
    </div>
    <button class="chat-close" id="chat-close">✕</button>
  </div>
  <div class="chat-emp-select" id="chat-emp-select"></div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="chat-input" rows="1" placeholder="Message your AI employee…"></textarea>
    <button class="chat-send" id="chat-send">↑</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════
//  EMPLOYEES
// ═══════════════════════════════════════════
const EMPLOYEES = [
  { name: 'Omar',  color: '#3b82f6', bodyHex: 0x3b82f6, skinHex: 0xf5c285, pos: [-2.5, 1.5], arrived: true,
    role: 'Head of Product',
    replies: ["Hey! What's up?", "On it — I'll have it done by EOD.", "Great idea, let me look into that.", "Can we hop on a quick call?"] },
  { name: 'Sarah', color: '#22c55e', bodyHex: 0x22c55e, skinHex: 0xe8b070, pos: [-5.0, -3.5], arrived: false,
    role: 'Lead Engineer',
    replies: ["Just pushed the fix to staging.", "Running the tests now, give me 5 mins.", "That's a tricky one — let me dig into the logs.", "Done! Deployed to prod."] },
  { name: 'Alex',  color: '#f59e0b', bodyHex: 0xf59e0b, skinHex: 0xf2bf78, pos: [2.0, -0.5], arrived: false,
    role: 'Marketing',
    replies: ["The campaign is performing really well!", "I'll draft a new copy and share it with you.", "Numbers are up 32% this week 🚀", "On it, sending the brief now."] },
  { name: 'Zara',  color: '#a855f7', bodyHex: 0xa855f7, skinHex: 0xeab86e, pos: [0.5, 2.8], arrived: true,
    role: 'UI/UX Designer',
    replies: ["I updated the Figma file, check it out!", "The new color palette is looking really clean.", "I can have the mockups ready by tomorrow.", "Good call — I'll revise the flow."] },
  { name: 'Chris', color: '#ef4444', bodyHex: 0xef4444, skinHex: 0xf0b268, pos: [4.5, 0.5], arrived: false,
    role: 'Sales',
    replies: ["Just closed that deal! 💪", "Following up with the lead now.", "They want a demo next Tuesday.", "Great news from the client!"] },
  { name: 'Mia',   color: '#06b6d4', bodyHex: 0x06b6d4, skinHex: 0xebba72, pos: [-1.5, -5.0], arrived: false,
    role: 'Customer Success',
    replies: ["Customer satisfaction is at 98% this week!", "I'll reach out to them right away.", "Issue resolved — client is happy.", "Onboarding the new accounts now."] },
];

// ── Build employee bar ──
const empBarEl = document.getElementById('emp-bar');
EMPLOYEES.forEach((e, i) => {
  if (i > 0) {
    const sep = document.createElement('div'); sep.className = 'emp-sep'; empBarEl.appendChild(sep);
  }
  const d = document.createElement('div');
  d.className = 'emp-item';
  d.innerHTML = `
    <div class="emp-av" style="background:${e.color}22;color:${e.color}">${e.name[0]}</div>
    <span class="emp-name">${e.name}</span>
    <div class="emp-dots">
      <div class="edot edot-on"></div>
      <div class="edot edot-off"></div>
      <div class="edot edot-off"></div>
    </div>`;
  d.addEventListener('click', () => openChat(i));
  empBarEl.appendChild(d);
});

// ── Build standup attendee list ──
const attList = document.getElementById('att-list');
EMPLOYEES.forEach(e => {
  const row = document.createElement('div');
  row.className = 'att-row';
  row.innerHTML = `
    <div class="att-av" style="background:${e.color}22;color:${e.color}">${e.name[0]}</div>
    <div class="att-name">${e.name}<br><span style="font-size:10px;color:#4a6080;font-weight:400">${e.role}</span></div>
    <div class="att-badge ${e.arrived ? 'arrived' : 'waiting'}">${e.arrived ? 'ARRIVED' : 'WAITING'}</div>`;
  attList.appendChild(row);
});

// ── Standup modal open/close ──
const standupOverlay = document.getElementById('standup-overlay');
document.getElementById('standup-btn').addEventListener('click', () => standupOverlay.classList.add('open'));
document.getElementById('standup-close').addEventListener('click', () => standupOverlay.classList.remove('open'));
standupOverlay.addEventListener('click', e => { if (e.target === standupOverlay) standupOverlay.classList.remove('open'); });

// ═══════════════════════════════════════════
//  CHAT PANEL
// ═══════════════════════════════════════════
const chatPanel = document.getElementById('chat-panel');
const chatMsgs  = document.getElementById('chat-msgs');
const chatInput = document.getElementById('chat-input');
let activeEmpIdx = 0;
const msgHistory = EMPLOYEES.map(() => []);

// Build emp pills
const chatEmpSelect = document.getElementById('chat-emp-select');
EMPLOYEES.forEach((e, i) => {
  const pill = document.createElement('div');
  pill.className = 'chat-emp-pill' + (i === 0 ? ' active' : '');
  pill.id = `pill-${i}`;
  pill.innerHTML = `<div class="dot" style="background:${e.color}"></div>${e.name}`;
  pill.addEventListener('click', () => switchChatEmp(i));
  chatEmpSelect.appendChild(pill);
});

function switchChatEmp(idx) {
  activeEmpIdx = idx;
  document.querySelectorAll('.chat-emp-pill').forEach((p, i) => p.classList.toggle('active', i === idx));
  const e = EMPLOYEES[idx];
  document.getElementById('chat-av').style.background = e.color + '22';
  document.getElementById('chat-av').style.color = e.color;
  document.getElementById('chat-av').textContent = e.name[0];
  document.getElementById('chat-name').textContent = e.name;
  renderMsgs(idx);
}

function renderMsgs(idx) {
  chatMsgs.innerHTML = '';
  const e = EMPLOYEES[idx];
  if (msgHistory[idx].length === 0) {
    addBubble(idx, e.name, e.color, `Hi! I'm ${e.name}, your ${e.role}. What do you need?`, false);
  } else {
    msgHistory[idx].forEach(m => {
      const div = buildBubble(m.name, m.color, m.text, m.isUser);
      chatMsgs.appendChild(div);
    });
    chatMsgs.scrollTop = chatMsgs.scrollHeight;
  }
}

function buildBubble(name, color, text, isUser) {
  const msg = document.createElement('div');
  msg.className = 'msg' + (isUser ? ' user' : '');
  msg.innerHTML = `
    <div class="msg-av" style="background:${color}22;color:${color}">${name[0]}</div>
    <div class="msg-body">
      <div class="msg-name">${name}</div>
      <div class="msg-bubble">${text}</div>
    </div>`;
  return msg;
}

function addBubble(idx, name, color, text, isUser) {
  msgHistory[idx].push({ name, color, text, isUser });
  if (idx !== activeEmpIdx) return;
  const div = buildBubble(name, color, text, isUser);
  chatMsgs.appendChild(div);
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
}

function showTyping() {
  const t = document.createElement('div');
  t.className = 'msg'; t.id = 'typing';
  t.innerHTML = `
    <div class="msg-av" style="background:${EMPLOYEES[activeEmpIdx].color}22;color:${EMPLOYEES[activeEmpIdx].color}">${EMPLOYEES[activeEmpIdx].name[0]}</div>
    <div class="msg-body">
      <div class="msg-name">${EMPLOYEES[activeEmpIdx].name}</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
      </div>
    </div>`;
  chatMsgs.appendChild(t);
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
}

function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;
  const e = EMPLOYEES[activeEmpIdx];
  addBubble(activeEmpIdx, 'You', '#7eb3ff', text, true);
  chatInput.value = '';
  chatInput.style.height = 'auto';
  showTyping();
  setTimeout(() => {
    document.getElementById('typing')?.remove();
    const reply = e.replies[Math.floor(Math.random() * e.replies.length)];
    addBubble(activeEmpIdx, e.name, e.color, reply, false);
  }, 800 + Math.random() * 800);
}

function openChat(idx) {
  chatPanel.classList.add('open');
  switchChatEmp(idx);
}

document.getElementById('chat-btn').addEventListener('click', () => openChat(activeEmpIdx));
document.getElementById('chat-close').addEventListener('click', () => chatPanel.classList.remove('open'));
document.getElementById('chat-send').addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px';
});

// Render initial messages for emp 0
renderMsgs(0);

// ═══════════════════════════════════════════
//  THREE.JS SCENE
// ═══════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x070d1a);

let W = window.innerWidth, H = window.innerHeight;
const FRUST = 13;
let aspect = W / H;

const camera = new THREE.OrthographicCamera(
  -FRUST * aspect, FRUST * aspect, FRUST, -FRUST, -100, 200
);
camera.position.set(18, 18, 18);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.insertBefore(renderer.domElement, document.body.firstChild);

// Lighting
scene.add(new THREE.AmbientLight(0xc8d8ff, 0.75));
const sun = new THREE.DirectionalLight(0xfff5f0, 1.1);
sun.position.set(14, 22, 14);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
Object.assign(sun.shadow.camera, { left: -25, right: 25, top: 25, bottom: -25, near: 0.5, far: 100 });
scene.add(sun);
const fill = new THREE.DirectionalLight(0x4488ff, 0.28);
fill.position.set(-10, 8, -10);
scene.add(fill);

// Materials
function mat(hex, emHex) {
  const m = new THREE.MeshLambertMaterial({ color: hex });
  if (emHex !== undefined) m.emissive = new THREE.Color(emHex);
  return m;
}
const M = {
  floor:   mat(0xdfd8c8),
  wall:    mat(0xeeeae4),
  wallB:   mat(0xe4e0da),
  desk:    mat(0x9a7548),
  deskTop: mat(0xc9a56a),
  chair:   mat(0x1e3050),
  chairB:  mat(0x142038),
  monitor: mat(0x0e1420),
  screen:  mat(0x0a1e3c, 0x040e1a),
  server:  mat(0x1e2030),
  srvLed:  mat(0x00dd88, 0x004422),
  rndTbl:  mat(0xc4804a),
  sofa:    mat(0x1e3a6e),
  sofaO:   mat(0xcc4512),
  pong:    mat(0x15803d),
  net:     mat(0xeaeaea),
  shelf:   mat(0x6a4e2a),
  plantP:  mat(0x7a3812),
  plantL:  mat(0x246020),
  tv:      mat(0x080c18),
  tvScr:   mat(0x071c2e, 0x030d18),
  cofTbl:  mat(0xb89060),
  pant:    mat(0x1a1a38),
};

// Helpers
function addBox(w, h, d, material, x, y, z, ry) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
  m.position.set(x, y, z);
  if (ry) m.rotation.y = ry;
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m); return m;
}
function addCyl(r, h, material, x, y, z, segs) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(r, r, h, segs || 12), material);
  m.position.set(x, y, z);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m); return m;
}

// ── Office Structure ──
const OW = 26, OD = 18, WH = 2.4, WT = 0.22;
addBox(OW, 0.12, OD, M.floor, 0, -0.06, 0);
addBox(OW, WH, WT, M.wall, 0, WH / 2, -OD / 2);
addBox(WT, WH, OD, M.wallB, -OW / 2, WH / 2, 0);
addBox(WT, WH, OD, M.wallB,  OW / 2, WH / 2, 0);
addBox(3.5, WH, WT, M.wall, -OW / 2 + 1.75, WH / 2,  OD / 2);
addBox(3.5, WH, WT, M.wall,  OW / 2 - 1.75, WH / 2,  OD / 2);
addBox(WT, WH, 6, M.wallB, -OW / 2 + 5.2, WH / 2, -OD / 2 + 3);

// Server room
const SX = -9.8, SZ = -6.2;
for (let i = 0; i < 4; i++) {
  addBox(0.55, 1.95, 0.38, M.server, SX + i * 0.72, 0.97, SZ);
  addBox(0.07, 0.05, 0.04, M.srvLed, SX + i * 0.72 + 0.18, 0.5 + Math.random() * 0.9, SZ - 0.21);
  addBox(0.07, 0.05, 0.04, M.srvLed, SX + i * 0.72 - 0.1, 0.9 + Math.random() * 0.4, SZ - 0.21);
}
addBox(3.2, 0.1, 0.65, M.deskTop, SX + 1.08, 0.88, SZ);

// Meeting room
const MX = -5.5, MZ = -4.5;
addCyl(1.3, 0.1, M.rndTbl, MX, 0.72, MZ);
addCyl(0.06, 0.72, M.desk, MX, 0.36, MZ);
for (let i = 0; i < 6; i++) {
  const ang = (i / 6) * Math.PI * 2;
  const cx = MX + Math.sin(ang) * 1.72, cz = MZ + Math.cos(ang) * 1.72;
  addBox(0.44, 0.1, 0.44, M.chair, cx, 0.7, cz);
  addBox(0.44, 0.44, 0.08, M.chairB, cx + Math.sin(ang) * 0.26, 1.0, cz + Math.cos(ang) * 0.26);
}

// Desk factory
function makeDesk(x, z, ry) {
  ry = ry || 0;
  const c = Math.cos(ry), s = Math.sin(ry);
  addBox(1.5, 0.08, 0.75, M.deskTop, x, 0.7, z, ry);
  addBox(1.5, 0.62, 0.05, M.desk, x - s * 0.34, 0.4, z - c * 0.34, ry);
  [[0.65, 0.3], [-0.65, 0.3], [0.65, -0.3], [-0.65, -0.3]].forEach(([dx, dz]) => {
    addBox(0.05, 0.7, 0.05, M.desk, x + dx * c - dz * s, 0.34, z + dx * s + dz * c);
  });
  addBox(0.55, 0.38, 0.04, M.monitor, x, 0.97, z - s * 0.1 + c * 0.14, ry);
  addBox(0.55, 0.38, 0.04, M.screen,  x, 0.97, z - s * 0.1 + c * 0.12, ry);
  addBox(0.04, 0.12, 0.04, M.monitor, x, 0.78, z - s * 0.1 + c * 0.1, ry);
}

[[-2.5,-1.5],[-0.5,-1.5],[1.5,-1.5],[-2.5,0.8],[-0.5,0.8],[1.5,0.8],[-2.5,3.0],[-0.5,3.0],[1.5,3.0],
 [5.0,-1.5],[7.0,-1.5],[5.0,0.8],[7.0,0.8],[5.0,3.0],[7.0,3.0]].forEach(([x, z]) => {
  makeDesk(x, z);
  addBox(0.42, 0.1, 0.42, M.chair, x, 0.7, z + 0.9);
  addBox(0.42, 0.38, 0.07, M.chairB, x, 0.94, z + 1.1);
  [[0.16,0.16],[-0.16,0.16],[0.16,-0.16],[-0.16,-0.16]].forEach(([dx,dz]) => {
    addBox(0.04, 0.7, 0.04, M.chairB, x + dx, 0.35, z + 0.9 + dz);
  });
});

// Lounge
addBox(2.6, 0.52, 0.78, M.sofa, 8.6, 0.26, -2.2);
addBox(0.78, 0.52, 2.4, M.sofa, 7.7, 0.26, -3.0);
addBox(2.6, 0.82, 0.12, M.sofa, 8.6, 0.67, -2.62);
addBox(0.12, 0.82, 2.4, M.sofa, 7.28, 0.67, -3.0);
addBox(0.72, 0.1, 0.6, M.chairB, 7.9, 0.53, -2.2);
addBox(0.72, 0.1, 0.6, M.chairB, 8.65, 0.53, -2.2);
addBox(0.72, 0.1, 0.6, M.chairB, 9.4, 0.53, -2.2);
addBox(0.92, 0.46, 0.78, M.sofaO, 9.2, 0.23, 0.6);
addBox(0.92, 0.82, 0.1, M.sofaO, 9.2, 0.64, 0.16);
addBox(1.15, 0.07, 0.68, M.cofTbl, 8.7, 0.44, -1.2);
[[-0.46,-0.28],[0.46,-0.28],[-0.46,0.28],[0.46,0.28]].forEach(([dx,dz]) => {
  addBox(0.05, 0.44, 0.05, M.desk, 8.7 + dx, 0.22, -1.2 + dz);
});

// Bookshelf
addBox(0.3, 2.1, 2.3, M.shelf, OW / 2 - 0.28, 1.05, -2.8);
[0.35, 0.9, 1.5].forEach(y => addBox(0.25, 0.05, 2.3, M.deskTop, OW / 2 - 0.28, y, -2.8));
[0xcc2222,0x2244aa,0x228833,0xcc8811,0x882299,0x226688,0xaa5522].forEach((c, i) => {
  addBox(0.07, 0.24, 0.18, new THREE.MeshLambertMaterial({ color: c }),
    OW / 2 - 0.28, 0.52 + Math.floor(i / 3) * 0.58, -2.8 + (i % 3 - 1) * 0.42);
});

// Ping pong
addBox(2.6, 0.09, 1.4, M.pong, 7.8, 0.6, 5.2);
addBox(0.04, 0.22, 1.4, M.net, 7.8, 0.74, 5.2);
[[-1.1,0.56],[1.1,0.56],[-1.1,-0.56],[1.1,-0.56]].forEach(([dx,dz]) => {
  addBox(0.06, 0.6, 0.06, M.desk, 7.8 + dx, 0.3, 5.2 + dz);
});

// TV
addBox(2.4, 1.35, 0.09, M.tv, 3, 1.5, -OD / 2 + 0.08);
addBox(2.25, 1.22, 0.07, M.tvScr, 3, 1.5, -OD / 2 + 0.14);

// Plants
function makePlant(x, z) {
  addCyl(0.18, 0.26, M.plantP, x, 0.13, z, 8);
  addCyl(0.09, 0.58, M.plantL, x, 0.52, z, 6);
  const lm = new THREE.Mesh(new THREE.SphereGeometry(0.3, 6, 5), M.plantL);
  lm.scale.y = 0.6; lm.position.set(x, 0.96, z); lm.castShadow = true; scene.add(lm);
}
[[-OW/2+0.7,-OD/2+0.7],[OW/2-0.9,-OD/2+0.7],[-OW/2+0.7,OD/2-0.9],[OW/2-0.9,OD/2-0.9],[6.5,-5.5],[-4.0,5.5]].forEach(([x,z]) => makePlant(x,z));

// ── Characters ──
const charGroups = [];
function makeChar(x, z, bodyHex, skinHex) {
  const g = new THREE.Group();
  const mBody = new THREE.MeshLambertMaterial({ color: bodyHex });
  const mSkin = new THREE.MeshLambertMaterial({ color: skinHex });
  [-0.07, 0.07].forEach(dx => {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.34, 0.12), M.pant);
    leg.position.set(dx, 0.17, 0); leg.castShadow = true; g.add(leg);
  });
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.36, 0.2), mBody);
  body.position.set(0, 0.51, 0); body.castShadow = true; g.add(body);
  [-0.22, 0.22].forEach(dx => {
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.3, 0.1), mBody);
    arm.position.set(dx, 0.47, 0); arm.castShadow = true; g.add(arm);
  });
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.24, 0.24), mSkin);
  head.position.set(0, 0.82, 0); head.castShadow = true; g.add(head);
  const hair = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.08, 0.26), M.pant);
  hair.position.set(0, 0.96, 0); g.add(hair);
  g.position.set(x, 0, z); scene.add(g); return g;
}
EMPLOYEES.forEach(e => charGroups.push(makeChar(e.pos[0], e.pos[1], e.bodyHex, e.skinHex)));

// ── Name tags ──
const ntContainer = document.getElementById('ntags');
const ntEls = [];
EMPLOYEES.forEach((e, i) => {
  const div = document.createElement('div');
  div.className = 'ntag';
  div.innerHTML = `<div class="ntag-box"><div class="ntag-dot" style="background:${e.color}"></div>${e.name}</div>`;
  div.style.cursor = 'pointer';
  div.addEventListener('click', () => openChat(i));
  ntContainer.appendChild(div);
  ntEls.push(div);
});

// ── Camera controls ──
let isDrag = false, prevXY = [0, 0];
let panX = 0, panZ = 0, tPanX = 0, tPanZ = 0;
let zoom = 1, tZoom = 1;
const cvs = renderer.domElement;
cvs.addEventListener('mousedown', e => { isDrag = true; prevXY = [e.clientX, e.clientY]; });
cvs.addEventListener('mousemove', e => {
  if (!isDrag) return;
  tPanX -= (e.clientX - prevXY[0]) * 0.025;
  tPanZ -= (e.clientY - prevXY[1]) * 0.025;
  prevXY = [e.clientX, e.clientY];
});
cvs.addEventListener('mouseup', () => isDrag = false);
cvs.addEventListener('mouseleave', () => isDrag = false);
cvs.addEventListener('wheel', e => {
  tZoom = Math.max(0.35, Math.min(3.5, tZoom - e.deltaY * 0.001));
  e.preventDefault();
}, { passive: false });
cvs.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { isDrag = true; prevXY = [e.touches[0].clientX, e.touches[0].clientY]; }
}, { passive: true });
cvs.addEventListener('touchmove', e => {
  if (!isDrag || e.touches.length !== 1) return;
  tPanX -= (e.touches[0].clientX - prevXY[0]) * 0.025;
  tPanZ -= (e.touches[0].clientY - prevXY[1]) * 0.025;
  prevXY = [e.touches[0].clientX, e.touches[0].clientY];
  e.preventDefault();
}, { passive: false });
cvs.addEventListener('touchend', () => isDrag = false);

// ── Name tag projection ──
const tmpV = new THREE.Vector3();
function updateNameTags() {
  charGroups.forEach((g, i) => {
    tmpV.set(g.position.x, g.position.y + 1.2, g.position.z);
    tmpV.project(camera);
    ntEls[i].style.left = ((tmpV.x *  0.5 + 0.5) * W) + 'px';
    ntEls[i].style.top  = ((-tmpV.y * 0.5 + 0.5) * H) + 'px';
  });
}

// ── Render loop ──
let t = 0;
(function animate() {
  requestAnimationFrame(animate);
  t += 0.012;
  panX += (tPanX - panX) * 0.1;
  panZ += (tPanZ - panZ) * 0.1;
  zoom += (tZoom - zoom) * 0.1;
  camera.position.set(18 + panX, 18, 18 + panZ);
  camera.lookAt(panX, 1, panZ);
  const fz = FRUST / zoom;
  camera.left = -fz * aspect; camera.right = fz * aspect;
  camera.top = fz; camera.bottom = -fz;
  camera.updateProjectionMatrix();
  charGroups.forEach((g, i) => {
    g.position.y = Math.sin(t * 1.3 + i * 1.2) * 0.04;
    g.rotation.y = Math.sin(t * 0.35 + i * 0.9) * 0.2;
  });
  updateNameTags();
  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight; aspect = W / H;
  renderer.setSize(W, H);
  camera.left = -FRUST * aspect; camera.right = FRUST * aspect;
  camera.updateProjectionMatrix();
});
</script>
